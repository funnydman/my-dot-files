# Hypridle configuration

general {
    lock_cmd = pidof swaylock || (grim /tmp/lockscreen.png && swaylock -f --image /tmp/lockscreen.png)
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen after 600 seconds (10 minutes)
listener {
    timeout = 600
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# Turn off screen after 800 seconds
listener {
    timeout = 800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock after 3 hours (10800 seconds)
listener {
    timeout = 10800
    on-timeout = loginctl lock-session
}

# Suspend after 4 hours (14400 seconds) — must be > lock timeout
listener {
    timeout = 14400
    on-timeout = systemctl suspend
}
