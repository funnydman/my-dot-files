# Hypridle configuration

general {
    lock_cmd = pidof swaylock || (grim /tmp/lockscreen.png && swaylock -f --image /tmp/lockscreen.png)
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen after 600 seconds (10 minutes)
listener {
    timeout = 600
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# No DPMS off — KVM stops routing USB when HDMI signal drops,
# making keyboard/mouse unresponsive. Monitor's own power saving handles blanking.

# Lock after 3 hours (10800 seconds)
listener {
    timeout = 10800
    on-timeout = loginctl lock-session
}

# No suspend — USB/XHCI controller fails to resume from deep sleep (PCI error -19),
# killing the KVM USB connection. Machine runs on AC with lid closed via KVM.
